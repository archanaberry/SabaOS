# ---------------------------------------------------------------------
# DISK IMAGE CONFIGURATION
# ---------------------------------------------------------------------
export DISK_SIZE="16G"
export DISK_FORMAT="qcow2"  # Options: iso, qcow2, img, vdi, vmdk
export DISK_NAME="sabaos"

# ---------------------------------------------------------------------
# ISO CONFIGURATION
# ---------------------------------------------------------------------
export ISO_NAME="sabaos.iso"
export ISO_LABEL="SABAOS"

# =============================================================================
# Helper function to print configuration
# =============================================================================
sabaos_print_config() {
    echo "========================================"
    echo "  SABAOS Build Configuration"
    echo "========================================"
    echo "Build Mode: ${SABAOS_BUILD_MODE}"
    echo "Target: ${TARGET}"
    echo "Architecture: ${TARGET_ARCH}"
    echo ""
    echo "Directories:"
    echo "  Root:      ${SABAOS_ROOT}"
    echo "  Sources:   ${SABAOS_SOURCES}"
    echo "  Build:     ${SABAOS_BUILD}"
    echo "  Rootfs:    ${SABAOS_ROOTFS}"
    echo "  ISO:       ${SABAOS_ISO}"
    echo "  Disk:      ${SABAOS_DISK}"
    echo ""
    echo "Core Versions:"
    echo "  GCC:       ${GCC_VER}"
    echo "  musl:      ${MUSL_VER}"
    echo "  Binutils:  ${BINUTILS_VER}"
    echo "  Limine:    ${LIMINE_VER}"
    echo "  Wayland:   ${WAYLAND_VER}"
    echo "  Sway:      ${SWAY_VER}"
    echo "========================================"
}
