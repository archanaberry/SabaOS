#!/bin/bash
# =============================================================================
# SABAOS - Version Configuration
# =============================================================================
# File ini berisi definisi versi dan konfigurasi build untuk SabaOS
# =============================================================================

# ---------------------------------------------------------------------
# BUILD MODE CONFIGURATION
# ---------------------------------------------------------------------
# MODE: "compile" atau "ready"
# - "compile": Download dan compile di /tmp, hasil di /tmp/sabaos
# - "ready": Langsung siap pakai di distro-files/rootfs
export SABAOS_BUILD_MODE="${SABAOS_BUILD_MODE:-compile}"

# Base directories
export SABAOS_ROOT="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
export SABAOS_SCRIPTS="${SABAOS_ROOT}/scripts"
export SABAOS_DISTRO="${SABAOS_ROOT}/distro-files"

# Mode-specific paths
if [ "$SABAOS_BUILD_MODE" = "compile" ]; then
    export SABAOS_TEMP="/tmp/sabaos-build"
    export SABAOS_BUILD="${SABAOS_TEMP}/build"
    export SABAOS_SOURCES="${SABAOS_TEMP}/sources"
    export SABAOS_ROOTFS="${SABAOS_TEMP}/rootfs"
    export SABAOS_ISO="${SABAOS_TEMP}/iso"
    export SABAOS_DISK="${SABAOS_TEMP}/disk"
else
    export SABAOS_TEMP="${SABAOS_ROOT}/temp"
    export SABAOS_BUILD="${SABAOS_ROOT}/build"
    export SABAOS_SOURCES="${SABAOS_ROOT}/sources"
    export SABAOS_ROOTFS="${SABAOS_DISTRO}/rootfs"
    export SABAOS_ISO="${SABAOS_ROOT}/iso"
    export SABAOS_DISK="${SABAOS_ROOT}/disk"
fi

# ---------------------------------------------------------------------
# TARGET CONFIGURATION
# ---------------------------------------------------------------------
export TARGET_ARCH="x86_64"
export TARGET="${TARGET_ARCH}-saba-linux-musl"
export TARGET_CPU="x86-64"

# ---------------------------------------------------------------------
# PARALLEL BUILD
# ---------------------------------------------------------------------
export MAKEFLAGS="-j$(nproc)"
export NPROC="$(nproc)"

# ---------------------------------------------------------------------
# OPTIMIZATION FLAGS
# ---------------------------------------------------------------------
export CFLAGS="-O2 -pipe -fomit-frame-pointer"
export CXXFLAGS="${CFLAGS}"
export LDFLAGS="-Wl,--as-needed"
export CROSS_COMPILE="${TARGET}-"

# ---------------------------------------------------------------------
# 1. CORE TOOLCHAIN
# -----
export BINUTILS_VER="2.46.0"
export GCC_VER="15.2.0"
export MUSL_VER="1.2.6"

# GCC Prerequisites
export GMP_VER="6.3.0"
export MPFR_VER="4.2.1"
export MPC_VER="1.3.1"

# ---------------------------------------------------------------------
# 2. KERNEL - FISHIX
# ---------------------------------------------------------------------
export FISHIX_URL="https://github.com/archanaberry/Fishix"
export FISHIX_BRANCH="main"

# ---------------------------------------------------------------------
# 3. INIT SYSTEM & BOOTLOADER
# ---------------------------------------------------------------------
export DINIT_VER="0.20.0"
export LIMINE_VER="11.3.1"

